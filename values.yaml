# ============================================================
# Observability Umbrella Chart - values.yaml
#
# Instala: Grafana + Loki Stack + Tempo + Prometheus
#
# Uso básico:
#   helm install obs . -n observability --create-namespace
#
# Com senha personalizada:
#   helm install obs . -n observability --create-namespace \
#     --set global.adminPassword=MinhaS3nha!
#
# Desabilitar um componente:
#   helm install obs . -n observability --create-namespace \
#     --set tempo.enabled=false
# ============================================================

# ── Configurações globais ────────────────────────────────────
global:
  # Cria o namespace automaticamente via template
  # Use --create-namespace no helm install OU defina como true aqui
  createNamespace: false

  # Senha do admin do Grafana.
  # Se vazio: gerada automaticamente e salva no Secret <release>-grafana-admin.
  # Upgrades futuros preservam a senha existente no Secret.
  adminPassword: ""

  # Storage class usada por todos os PVCs.
  # Vazio = usa o default do cluster.
  storageClass: ""

# ── Grafana ──────────────────────────────────────────────────
grafana:
  enabled: true

  # Senha gerenciada pelo Secret criado pelo template grafana-admin-secret.yaml.
  # Nome fixo para poder ser referenciado no values.yaml.
  # Para múltiplos releases no mesmo namespace, override com --set grafana.admin.existingSecret=<nome>
  admin:
    existingSecret: "grafana-admin-secret"
    userKey: admin-user
    passwordKey: admin-password

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  "grafana.ini":
    feature_toggles:
      # backgroundPluginInstaller instala automaticamente plugins como
      # grafana-lokiexplore-app (Logs Drilldown) que requerem Loki 3.x.
      # Com grafana/loki 6.x (Loki 3.6.5), todas as APIs são suportadas.
      backgroundPluginInstaller: true

  # Sidecar que monitora ConfigMaps com label grafana_datasource=1
  # e os carrega automaticamente — assim os datasources são resolvidos
  # em tempo de template com os nomes corretos de serviço.
  sidecar:
    datasources:
      enabled: true
      label: grafana_datasource
      labelValue: "1"
    dashboards:
      enabled: false

  # Dashboards importados do Grafana.com
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/default

  dashboards:
    default:
      kubernetes-cluster:
        gnetId: 7249
        revision: 1
        datasource: Prometheus
      kubernetes-nodes:
        gnetId: 8171
        revision: 1
        datasource: Prometheus
      loki-logs:
        gnetId: 11692
        revision: 1
        datasource: Loki

  ingress:
    enabled: false
    # ingressClassName: nginx
    # hosts:
    #   - grafana.seudominio.com

# ── Loki 3.x (Single Binary) ─────────────────────────────────
# Chart: grafana/loki 6.53.0 — Loki 3.6.5
# SingleBinary: todos os componentes num único pod (ideal para produção simples e Kind).
# Para escalar, use deploymentMode: SimpleScalable ou Distributed.
loki:
  enabled: true

  deploymentMode: SingleBinary

  loki:
    auth_enabled: false

    commonConfig:
      replication_factor: 1

    storage:
      type: filesystem

    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      retention_period: 744h
      # Habilita o endpoint /loki/api/v1/index/volume (Logs Drilldown)
      volume_enabled: true

  singleBinary:
    replicas: 1

    persistence:
      enabled: true
      size: 50Gi
      storageClassName: ""

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  # Desabilitar componentes distribuídos (usados apenas em SimpleScalable/Distributed)
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # Desabilitar monitoramento interno (usa Prometheus externo do stack)
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false

  test:
    enabled: false

  # Gateway desabilitado: acesso direto ao serviço <release>-loki:3100
  gateway:
    enabled: false

# ── Promtail ──────────────────────────────────────────────────
# Chart: grafana/promtail 6.17.1 — Promtail 3.5.1
# DaemonSet que coleta logs de todos os pods e envia para o Loki.
promtail:
  enabled: true

  # config.file é processado com `tpl` pelo chart — .Release.Name resolve
  # para o release pai (ex: obs). O serviço do Loki é <release>-loki:3100.
  config:
    logLevel: info
    serverPort: 3101
    file: |
      server:
        log_level: info
        http_listen_port: 3101

      clients:
        - url: http://{{ .Release.Name }}-loki:3100/loki/api/v1/push

      positions:
        filename: /run/promtail/positions.yaml

      scrape_configs:
        - job_name: kubernetes-pods
          pipeline_stages:
            - cri: {}
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: __host__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - action: replace
              source_labels: [__meta_kubernetes_namespace]
              target_label: namespace
            - action: replace
              source_labels: [__meta_kubernetes_pod_name]
              target_label: pod
            - action: replace
              source_labels: [__meta_kubernetes_pod_container_name]
              target_label: container
            - action: replace
              source_labels: [__meta_kubernetes_pod_label_app]
              target_label: app
            - replacement: /var/log/pods/*$1/*.log
              separator: /
              source_labels:
                - __meta_kubernetes_pod_uid
                - __meta_kubernetes_pod_container_name
              target_label: __path__

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

# ── Tempo ────────────────────────────────────────────────────
tempo:
  enabled: true

  tempo:
    config:
      server:
        http_listen_port: 3200

      distributor:
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
          jaeger:
            protocols:
              thrift_http:
                endpoint: 0.0.0.0:14268
              grpc:
                endpoint: 0.0.0.0:14250

      storage:
        trace:
          backend: local
          local:
            path: /var/tempo/traces
          wal:
            path: /var/tempo/wal

      compactor:
        compaction:
          block_retention: 336h

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    persistence:
      enabled: true
      size: 20Gi
      storageClassName: ""

# ── Prometheus ───────────────────────────────────────────────
prometheus:
  enabled: true

  server:
    service:
      type: ClusterIP
      servicePort: 80

    persistentVolume:
      enabled: true
      size: 50Gi
      storageClassName: ""

    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 2Gi

    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    retention: "30d"

    ingress:
      enabled: false

  alertmanager:
    enabled: true
    persistence:
      size: 5Gi

  kube-state-metrics:
    enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

  prometheus-node-exporter:
    enabled: true
    resources:
      requests:
        cpu: 20m
        memory: 32Mi
      limits:
        cpu: 200m
        memory: 64Mi
    tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists

  prometheus-pushgateway:
    enabled: false
