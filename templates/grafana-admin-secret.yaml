{{- if .Values.grafana.enabled }}
{{/*
  Gerencia a senha do Grafana de forma idempotente:
  1. Se o secret já existe (upgrade), mantém a senha atual.
  2. Se global.adminPassword está definido, usa ele.
  3. Caso contrário, gera uma senha aleatória de 20 chars.

  O nome do secret é FIXO ("grafana-admin-secret") para que possa ser
  referenciado em values.yaml sem depender do .Release.Name em tempo
  de template. Para ambientes multi-release no mesmo namespace, use
  --set grafana.admin.existingSecret=<nome-customizado>.
*/}}
{{- $secretName := .Values.grafana.admin.existingSecret | default "grafana-admin-secret" -}}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
{{- $password := "" -}}
{{- if $existingSecret -}}
  {{- $password = index $existingSecret.data "admin-password" | b64dec -}}
{{- else if .Values.global.adminPassword -}}
  {{- $password = .Values.global.adminPassword -}}
{{- else -}}
  {{- $password = randAlphaNum 20 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "observability.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  admin-user: admin
  admin-password: {{ $password | quote }}
{{- end }}
